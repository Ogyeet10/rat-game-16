<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>rat game 16 wasm demo</title>
    <style>
      :root {
        color-scheme: dark;
        background: #070604;
        color: #f5e7bd;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      html {
        height: 100%;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 12% 8%, rgba(176, 122, 39, 0.26), transparent 28rem),
          radial-gradient(circle at 86% 24%, rgba(93, 62, 28, 0.3), transparent 24rem),
          linear-gradient(145deg, #070604, #171007 58%, #050403);
      }

      main {
        width: 100vw;
        height: 100vh;
        margin: 0 auto;
        padding: clamp(0.75rem, 2vw, 1.5rem);
        display: flex;
        flex-direction: column;
      }

      .panel {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        border: 1px solid rgba(245, 231, 189, 0.18);
        border-radius: 1rem;
        background: rgba(6, 5, 3, 0.74);
        box-shadow: 0 1.25rem 5rem rgba(0, 0, 0, 0.48), inset 0 0 4rem rgba(176, 122, 39, 0.08);
        overflow: hidden;
      }

      iframe {
        flex: 1;
        display: block;
        width: 100%;
        min-height: 0;
        border: 0;
        background: #050403;
      }

      .toolbar {
        flex: none;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.85rem 1rem;
        border-top: 1px solid rgba(245, 231, 189, 0.14);
        color: #bfa56b;
        font-size: 0.85rem;
      }

      a {
        color: #ffe39b;
      }

    </style>
  </head>
  <body>
    <main>
      <section class="panel" aria-label="rat game wasm demo">
        <iframe id="rat-frame" src="dist/wasm/index.html" title="rat game 16 wasm build"></iframe>
        <div class="toolbar">
          <span>controls: wasd, arrows, enter, [ ], esc, q</span>
          <span><a href="dist/wasm/index.html">open generated build directly</a></span>
        </div>
      </section>
    </main>
    <script>
      var frame = document.getElementById('rat-frame');

      function sendKey(code) {
        var child = frame && frame.contentWindow;
        var mod = child && child.Module;
        if (mod && mod.ccall) mod.ccall('rat_key', null, ['number'], [code]);
      }

      function sendSequence(codes) {
        for (var i = 0; i < codes.length; i++) sendKey(codes[i]);
      }

      document.addEventListener('keydown', function(event) {
        if (event.repeat) return;
        switch (event.key) {
          case 'ArrowUp': sendKey(91); break;
          case 'ArrowDown': sendKey(93); break;
          case 'ArrowRight': sendSequence([27, 91, 67]); break;
          case 'ArrowLeft': sendSequence([27, 91, 68]); break;
          case 'Enter': sendKey(13); break;
          case 'Escape': sendKey(27); break;
          default:
            if (event.key.length === 1) sendKey(event.key.charCodeAt(0));
            else return;
        }
        event.preventDefault();
      });
    </script>
  </body>
</html>
